<style>
  :root {
    --background: 240 10% 3.9%;

  .dark {

  body {
    font-family: 'Inter', sans-serif;
  }

  body.light-mode-bg {
    background-color: #f1f5f9; /* slate-100 */
  }
  body.dark-mode-bg {
    background-color: #020617; /* slate-950 */
  }
  
  .backdrop-blur-lg {
    -webkit-backdrop-filter: blur(16px);
    backdrop-filter: blur(16px);
  }
  .backdrop-blur-sm {
    -webkit-backdrop-filter: blur(4px);
    backdrop-filter: blur(4px);
  }

  @keyframes loading-ripple {
    0% {
      transform: scale(0.8);
      opacity: 0.8;
      border-width: 4px;
    }
    100% {
      transform: scale(2.5);
      opacity: 0;
      border-width: 1px;
    }
  }
  .loading-ripple {
    position: absolute;
    border-radius: 50%;
    border: 4px solid #3b82f6;
    animation: loading-ripple 1.5s cubic-bezier(0, 0.2, 0.8, 1) infinite;
  }

  @keyframes fade-in-up {
    from {
      opacity: 0;
      transform: translateY(20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
  .animate-fade-in-up {
    animation: fade-in-up 0.6s ease-out forwards;
    opacity: 0; /* Start hidden */
  }
  
  @keyframes splash-shake {
    0%, 100% { transform: translate(0, 0) rotate(0); }
    20%, 60% { transform: translate(-2px, 2px) rotate(-3deg); }
    40%, 80% { transform: translate(2px, -2px) rotate(3deg); }
  }
  .animate-splash-shake {
    animation: splash-shake 0.5s ease-in-out;
  }
